version: '3.8'

services:
  # 1. Node.js Express API Backend Gateway
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placement_tracker_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb+srv://<username>:<password>@cluster0.xxxx.mongodb.net/placement_tracker?retryWrites=true&w=majority
      - JWT_SECRET=your_jwt_signing_secret_here
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY_HERE
      - CLIENT_URL=http://localhost:5173
    networks:
      - placement-network

  # 2. Compile-built React Frontend Static Nginx Container
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: placement_tracker_frontend
    ports:
      - "5173:80" # Maps local Vite standard port to the Nginx HTTP container port
    depends_on:
      - backend
    networks:
      - placement-network

networks:
  placement-network:
    driver: bridge
